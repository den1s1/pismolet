name: dotnet

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Pismolet.sln

      - name: Format check
        run: dotnet format Pismolet.sln --verify-no-changes --verbosity minimal

      - name: Build
        run: dotnet build Pismolet.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Pismolet.sln --configuration Release --no-build --verbosity normal
